name: Documentation Issue
description: Report unclear, missing, or outdated documentation
title: "[Docs]: "
labels: ["documentation", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping us improve our documentation!
  - type: input
    id: page
    attributes:
      label: Which docs page or section is affected?
      description: Provide the URL or file path.
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is unclear, missing, or outdated?
      description: Explain the problem with the current documentation.
    validations:
      required: true
  - type: textarea
    id: correction
    attributes:
      label: Suggested correction
      description: If you have a specific suggestion or rewrite, please share it.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Context or screenshots
      description: Any additional information that would help us address the issue.
    validations:
      required: false
